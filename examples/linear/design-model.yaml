name: "Linear"
description: "Real-brand analysis sample from linear.app. Near-black product canvas, cool indigo signal color, compact radii, dense framed UI, and a product-window hero with almost no decorative background."
philosophy: "Precision before personality theater. Linear's visual identity comes from quiet control: restrained color, very small corners, disciplined typography, and product surfaces that feel machined rather than styled. The tension is between crisp operational UI and the occasional editorial interruption, not between minimalism and spectacle."
primary_mode: "dark"
brand_source: "https://linear.app"
brand_domain: "issue tracking / product planning / agent-assisted product operations"
brand_type: "ui-rich"
mono_for_code: true
mono_for_metrics: false

primitives:
  colors:
    neutral:
      0:   "#FFFFFF"
      50:  "#F7F8F8"
      100: "#E6E6E6"
      200: "#D0D6E0"
      300: "#8A8F98"
      400: "#62666D"
      500: "#3E4146"
      600: "#28282C"
      700: "#23252A"
      800: "#141516"
      900: "#0F1011"
      950: "#08090A"
    brand:
      50:  "#EEF1FF"
      100: "#D9DEFF"
      200: "#B8C0FF"
      300: "#9AA5FF"
      400: "#828FFF"
      500: "#7170FF"
      600: "#5E6AD2"
      700: "#5142C4"
      800: "#2A2D48"
      900: "#18182F"
    red:
      50:  "#FEF2F2"
      500: "#EB5757"
      900: "#7F1D1D"
    green:
      50:  "#F0FDF4"
      500: "#27A644"
      900: "#14532D"
    amber:
      50:  "#FFFBEB"
      500: "#F0BF00"
      900: "#78350F"
    blue:
      500: "#4EA7FC"
    teal:
      500: "#00B8CC"
    orange:
      500: "#FC7840"
  spacing: [0, 2, 4, 8, 12, 16, 20, 24, 32, 48, 64, 96, 128]
  radii: [0, 4, 6, 8, 12, 16, 999]

tokens:
  colors:
    dark:
      background:     "{neutral.950}"
      surface1:       "{neutral.900}"
      surface2:       "{neutral.800}"
      surface3:       "{neutral.700}"
      border:         "{neutral.700}"
      border_visible: "{neutral.600}"
      text1:          "{neutral.50}"
      text2:          "{neutral.200}"
      text3:          "{neutral.300}"
      text4:          "{neutral.400}"
      accent:         "{brand.500}"
      accent_hover:   "{brand.400}"
      accent_subtle:  "{brand.900}"
    light:
      background:     "{neutral.0}"
      surface1:       "{neutral.50}"
      surface2:       "#F5F5F5"
      surface3:       "{neutral.100}"
      border:         "#E0E0E0"
      border_visible: "{neutral.200}"
      text1:          "#2F2F31"
      text2:          "#5C5D5F"
      text3:          "#9E9EA0"
      text4:          "#B0B5C0"
      accent:         "{brand.600}"
      accent_hover:   "#6D78D5"
      accent_subtle:  "{brand.50}"
    status:
      success: "{green.500}"
      warning: "{amber.500}"
      error:   "{red.500}"

  spacing:
    2xs: 2
    xs: 4
    sm: 8
    md: 16
    lg: 24
    xl: 32
    2xl: 48
    3xl: 64
    4xl: 96

  radii:
    element: 4
    control: 6
    component: 8
    container: 12
    pill: 999

  typography:
    display:
      family: "Inter"
      real_font: "Inter Variable"
      fallback: "'SF Pro Display', -apple-system, system-ui, sans-serif"
      size: "64px"
      weight: 510
      line_height: 1
      letter_spacing: "-0.022em"
      google_fonts: "Inter:wght@400;500;600;700"
    body:
      family: "Inter"
      real_font: "Inter Variable"
      fallback: "'SF Pro Display', -apple-system, system-ui, sans-serif"
      size: "15px"
      weight: 400
      line_height: 1.6
      letter_spacing: "-0.011em"
      google_fonts: "Inter:wght@400;500;600;700"
    mono:
      family: "JetBrains Mono"
      real_font: "Berkeley Mono"
      approximation_note: "Linear's real monospace on the site is Berkeley Mono. JetBrains Mono is used here as a freely available fallback with a similarly technical, compact feel."
      fallback: "'SF Mono', Menlo, monospace"
      size: "12px"
      weight: 400
      google_fonts: "JetBrains+Mono:wght@400;500"
    editorial_display:
      family: "Cormorant Garamond"
      real_font: "Tiempos Headline"
      approximation_note: "Linear's /method page introduces Tiempos Headline as an editorial interrupt, not a system-wide display font. This is documented here, but not used as the primary landing-page display type."
      google_fonts: "Cormorant+Garamond:wght@400;500;600"

  type_scale:
    display: { size: "64px", line_height: 1.0, letter_spacing: "-0.022em", weight: 510, use: "Primary hero claims" }
    h1:      { size: "40px", line_height: 1.1, letter_spacing: "-0.022em", weight: 510, use: "Major section headings" }
    h2:      { size: "20px", line_height: 1.33, letter_spacing: "-0.012em", weight: 590, use: "Feature card titles" }
    h3:      { size: "16px", line_height: 1.45, letter_spacing: "-0.01em", weight: 510, use: "Subheads and tabs" }
    body:    { size: "15px", line_height: 1.6, letter_spacing: "-0.011em", weight: 400, use: "Body copy and product labels" }
    body_sm: { size: "13px", line_height: 1.5, letter_spacing: "-0.01em", weight: 400, use: "Navigation and metadata" }
    caption: { size: "12px", line_height: 1.4, letter_spacing: "0em", weight: 400, use: "Footnotes and secondary product chrome" }
    label:   { size: "11px", line_height: 1.3, letter_spacing: "0.06em", weight: 510, use: "Eyebrows, chips, tiny metadata" }

  elevation:
    strategy: "flat-with-micro-stack"
    notes: "Most depth comes from border contrast, inset hairlines, and subtle layered shadow stacks. Large atmospheric shadows are absent."
    shadows:
      cta_light: "0px 8px 2px 0px rgba(0,0,0,0), 0px 5px 2px 0px rgba(0,0,0,0.01), 0px 3px 2px 0px rgba(0,0,0,0.04), 0px 1px 1px 0px rgba(0,0,0,0.07), 0px 0px 1px 0px rgba(0,0,0,0.08)"
      cta_dark:  "0px 0px 0px 1px rgba(255,255,255,0.03) inset, 0px 1px 0px 0px rgba(255,255,255,0.04) inset, 0px 0px 0px 1px rgba(0,0,0,0.6), 0px 4px 4px 0px rgba(0,0,0,0.1)"
      panel_inset: "0px 0px 0px 1px #23252A inset"

  motion:
    personality: "mechanical"
    easing: "ease-out"
    duration_fast: "100ms"
    duration_normal: "250ms"
    duration_slow: "350ms"
    notes: "Observed CSS exposes 0.1s quick transitions and 0.25s regular transitions. Motion is terse and never springy."

  hero_stage:
    preset: null
    observed_style:
      description: "Linear's homepage hero is almost blank: a near-black field, a restrained product-window composition centered below the headline, and only the faintest ambient lift behind it. The product frame is the identity signal; the background avoids claiming attention."
      where_used:
        - "homepage hero"
      notes: "This is closer to a 'device-on-near-blank' stage than a true mesh. The absence of a decorative field is itself a major style decision."
    background:
      medium: "absent"
      color_mode: "brand-tinted-neutral"
      saturation: "flat"
      light_source: "ambient"
      falloff: "soft"
      vignette: "off"
      texture: "clean"
      motion: "static"
      intensity: "subtle"
      safe_zone: "masked-for-text"
      color_palette:
        - "#08090A"
        - "#0F1011"
        - "#141516"
        - "#18182F"
        - "#5E6AD2"
    hero:
      subject: "device"
      placement: "center"
      scale: "dominant"
      tint: "neutral"
    relation:
      type: "shadow-only"
      bleed: 0
    disclaimer: "Rendered as an abstract product-window composition. Linear's real UI and screenshots remain proprietary."

  iconography:
    observed_style:
      description: "Linear's interface icons on the marketing site read as compact filled glyphs: 14-16px, geometric, minimal, and calm. They are less expressive than the typography and mainly serve scanning and product chrome."
      stroke_weight: "filled"
      corner_treatment: "soft"
      fill_style: "solid"
      form_language: "geometric"
      visual_density: "minimal"
    fallback_kit:
      name: "Material Symbols Rounded"
      weight: "400 fill"
      match_score: "medium"
      match_reasoning: "Material Symbols Rounded in filled mode gets closer to Linear's compact solid glyph feel than outline-focused kits. The geometry is more system-like than Linear's custom set, but it preserves the small, calm, filled-icon register better than Lucide or Phosphor regular."
      cdn: "https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0"
      icon_class_prefix: "material-symbols-rounded"
    disclaimer: "The generated preview uses a best-match fallback icon kit. Linear's actual icons are proprietary."

components:
  button_primary:
    source: "observed"
    teardown: "Homepage header CTA ('Sign up') and repeated neutral-filled CTAs"
    background: "{tokens.colors.light.surface3}"
    background_dark: "{tokens.colors.dark.text1}"
    color: "{tokens.colors.light.text1}"
    color_dark: "{tokens.colors.dark.background}"
    font_family: "{tokens.typography.body.family}"
    font_size: "{tokens.type_scale.body_sm.size}"
    font_weight: 510
    padding: "10px 14px"
    radius: "{tokens.radii.element}"
    border: "1px solid currentColor"
    border_opacity: 0
    shadow_light: "{tokens.elevation.shadows.cta_light}"
    hover:
      background: "#FFFFFF"
    notes: "Primary marketing CTA is neutral, not accent-colored."

  button_secondary:
    source: "observed"
    teardown: "Pricing comparison CTAs and dark surface actions"
    background: "rgba(255,255,255,0.05)"
    color: "{tokens.colors.dark.text1}"
    font_size: "{tokens.type_scale.body_sm.size}"
    font_weight: 510
    padding: "10px 14px"
    radius: "{tokens.radii.element}"
    border: "1px solid rgba(255,255,255,0.08)"
    shadow: "{tokens.elevation.shadows.cta_dark}"

  button_link:
    source: "observed"
    teardown: "Customer-page 'Make the switch' and homepage inline links"
    background: "transparent"
    color: "#828FFF"
    font_size: "{tokens.type_scale.body.size}"
    font_weight: 510
    padding: "0px"
    radius: 0
    border: "none"
    hover:
      color: "{tokens.colors.dark.text1}"

  card:
    source: "observed"
    teardown: "Customer story cards and homepage product panels"
    background: "{tokens.colors.dark.surface1}"
    radius: "{tokens.radii.container}"
    padding: "24px 24px 28px"
    border: "1px solid rgba(255,255,255,0.05)"
    shadow: "none"
    inset_stroke: "{tokens.elevation.shadows.panel_inset}"

  input:
    source: "observed"
    teardown: "Homepage/product textarea styling from embedded product surfaces"
    background: "rgba(255,255,255,0.02)"
    radius: "{tokens.radii.control}"
    padding: "12px 14px"
    border_default: "1px solid rgba(255,255,255,0.08)"
    border_focus: "1px solid #5E69D1"
    focus_ring: "0px 0px 0px 1px #5E69D1"
    text_color: "{tokens.colors.dark.text2}"
    placeholder_color: "{tokens.colors.dark.text3}"

  tab_pill:
    source: "observed"
    teardown: "Customers page category tabs"
    radius: "{tokens.radii.pill}"
    padding: "0px 16px"
    height: "40px"
    selected:
      background: "{tokens.colors.dark.text1}"
      color: "{tokens.colors.dark.background}"
      border: "1px solid {tokens.colors.dark.text1}"
    idle:
      background: "transparent"
      color: "{tokens.colors.dark.text3}"
      border: "1px solid rgba(255,255,255,0.05)"

  list_row:
    source: "observed"
    teardown: "Customers directory rows"
    height: "56px"
    padding: "0px 0px"
    border_bottom: "1px solid rgba(255,255,255,0.05)"
    text_primary: "{tokens.colors.dark.text1}"
    text_secondary: "{tokens.colors.dark.text3}"
    interaction: "Rows stay visually flat; emphasis comes from alignment and contrast rather than hover fill."

  nav_item:
    source: "observed"
    teardown: "Embedded app sidebar items in homepage hero"
    radius: "{tokens.radii.control}"
    padding: "0px 6px"
    font_size: "{tokens.type_scale.body_sm.size}"
    font_weight: 510
    idle_color: "{tokens.colors.dark.text2}"
    active_background: "rgba(255,255,255,0.04)"
    muted_color: "{tokens.colors.dark.text4}"
