name: "Cursor"
description: "Validation package generated from live inspection of cursor.com, /product, and /pricing. Warm off-white canvas, ink-dark typography, scarce orange signaling, oversized pill CTAs, paper-toned cards, and product-window demos that sit on soft painterly backdrops."
philosophy: "Cursor's marketing language is developer-native but not cyberpunk. It trades dark futurism for warm editorial calm: cream backgrounds, quiet shadows, almost monoweight typography, and just enough orange to mark emphasis. The tension is between research-lab restraint and product velocity."
primary_mode: "light"
brand_source: "https://cursor.com plus live inspection of /product and /pricing"
brand_domain: "AI coding assistant / agentic IDE / developer tooling"
brand_type: "ui-rich"
mono_for_code: true
mono_for_metrics: false

primitives:
  colors:
    neutral:
      0:   "#FFFFFF"
      50:  "#FBFAF7"
      100: "#F7F7F4"
      200: "#F2F1ED"
      300: "#EBEAE5"
      400: "#E6E5E0"
      500: "#C9C5BC"
      600: "#8E877A"
      700: "#5B564E"
      800: "#3D392F"
      900: "#26251E"
      950: "#171611"
    brand:
      50:  "#FFF2EB"
      100: "#FFE3D6"
      200: "#FFC5A9"
      300: "#FFA67C"
      400: "#FF7A3B"
      500: "#F54E00"
      600: "#D84500"
      700: "#B33A00"
      800: "#7E2F10"
      900: "#4E2314"
    green:
      50:  "#EAF8F2"
      500: "#1F8A65"
      900: "#134F3D"
    amber:
      50:  "#FAF2E4"
      500: "#C08532"
      900: "#6A4922"
    red:
      50:  "#FCE9EE"
      500: "#CF2D56"
      900: "#6E1E34"
    blue:
      500: "#3A6A9F"
    purple:
      500: "#9E94D5"
  spacing: [0, 2, 4, 8, 12, 16, 20, 24, 32, 40, 48, 64, 80, 96, 120]
  radii: [0, 2, 4, 8, 10, 16, 999]

tokens:
  colors:
    light:
      background:     "{neutral.100}"
      surface1:       "{neutral.200}"
      surface2:       "{neutral.300}"
      surface3:       "{neutral.400}"
      border:         "rgba(38,37,30,0.10)"
      border_visible: "rgba(38,37,30,0.20)"
      text1:          "{neutral.900}"
      text2:          "rgba(38,37,30,0.60)"
      text3:          "rgba(38,37,30,0.55)"
      text4:          "rgba(38,37,30,0.40)"
      accent:         "{brand.500}"
      accent_hover:   "{brand.600}"
      accent_subtle:  "{brand.50}"
    dark:
      background:     "{neutral.950}"
      surface1:       "{neutral.900}"
      surface2:       "{neutral.800}"
      surface3:       "{neutral.700}"
      border:         "rgba(247,247,244,0.10)"
      border_visible: "rgba(247,247,244,0.16)"
      text1:          "{neutral.100}"
      text2:          "rgba(247,247,244,0.72)"
      text3:          "rgba(247,247,244,0.55)"
      text4:          "rgba(247,247,244,0.35)"
      accent:         "{brand.400}"
      accent_hover:   "{brand.300}"
      accent_subtle:  "{brand.900}"
    status:
      success: "{green.500}"
      warning: "{amber.500}"
      error:   "{red.500}"

  spacing:
    2xs: 2
    xs: 4
    sm: 8
    md: 16
    lg: 24
    xl: 32
    2xl: 48
    3xl: 64
    4xl: 96

  radii:
    element: 4
    control: 8
    component: 10
    container: 16
    pill: 999

  typography:
    display:
      family: "Geist"
      real_font: "CursorGothic"
      approximation_note: "CursorGothic is the brand-defining grotesk. Geist is a practical open substitute that preserves the modern developer-tool tone without adding softness."
      fallback: "\"Helvetica Neue\", Helvetica, Arial, system-ui, sans-serif"
      size: "36px"
      weight: 400
      line_height: 1.2
      letter_spacing: "-0.02em"
      google_fonts: "Geist:wght@400;500;600"
    body:
      family: "Geist"
      real_font: "CursorGothic"
      fallback: "\"Helvetica Neue\", Helvetica, Arial, system-ui, sans-serif"
      size: "16px"
      weight: 400
      line_height: 1.5
      letter_spacing: "0em"
      google_fonts: "Geist:wght@400;500;600"
    mono:
      family: "JetBrains Mono"
      real_font: "Berkeley Mono"
      approximation_note: "Cursor uses Berkeley Mono for code-adjacent surfaces. JetBrains Mono is a practical open fallback with a similarly crisp engineering voice."
      fallback: "\"SF Mono\", Menlo, Consolas, monospace"
      size: "12px"
      weight: 400
      google_fonts: "JetBrains+Mono:wght@400;500"

  type_scale:
    display:  { size: "72px", line_height: 1.1, letter_spacing: "-0.03em", weight: 400, use: "Large conversion headlines and terminal CTA moments" }
    h1:       { size: "52px", line_height: 1.15, letter_spacing: "-0.025em", weight: 400, use: "Primary page titles such as pricing" }
    h2:       { size: "36px", line_height: 1.2, letter_spacing: "-0.02em", weight: 400, use: "Key product and section statements" }
    h3:       { size: "26px", line_height: 1.25, letter_spacing: "-0.012em", weight: 400, use: "Homepage lead statements and feature titles" }
    body:     { size: "16px", line_height: 1.5, letter_spacing: "0em", weight: 400, use: "Paragraphs, buttons, and plan details" }
    body_sm:  { size: "14px", line_height: 1.5, letter_spacing: "0em", weight: 400, use: "Navigation, metadata, and utility labels" }
    caption:  { size: "12px", line_height: 1.45, letter_spacing: "0em", weight: 400, use: "Inline product chrome and small helper text" }
    label:    { size: "11px", line_height: 1.3, letter_spacing: "0.02em", weight: 400, use: "Overlines, tiny utility states, and compact controls" }

  elevation:
    strategy: "subtle-product-window"
    notes: "Most marketing cards stay flat. Depth appears mainly in product-window demos through layered soft shadows and hairline edges."
    shadows:
      hero_window: "0px 28px 70px 0px rgba(0,0,0,0.14), 0px 14px 32px 0px rgba(0,0,0,0.10), 0px 0px 0px 1px rgba(38,37,30,0.10)"
      nested_window: "0px 25px 50px -12px rgba(0,0,0,0.25), 0px 12px 24px -8px rgba(0,0,0,0.15), 0px 0px 0px 0.5px rgba(38,37,30,0.10)"
      outline: "0 0 0 1px rgba(38,37,30,0.10)"

  motion:
    personality: "smooth"
    easing: "cubic-bezier(.4, 0, .2, 1)"
    duration_fast: "140ms"
    duration_normal: "150ms"
    duration_slow: "240ms"
    notes: "Transitions are short and controlled. Cursor hints at spring curves in the token layer, but the visible marketing feel stays restrained."

  hero_stage:
    preset: null
    observed_style:
      description: "Cursor uses a split hero. The page itself stays almost blank and cream, then a large product window lands on top of a washed painterly landscape. The scenic field is muted and acts as atmosphere behind the interface rather than becoming the whole composition."
      where_used:
        - "homepage hero"
        - "homepage product demo band"
      notes: "The product window is the real hero subject. The painted field exists to warm the scene and keep the demo from feeling like sterile SaaS chrome."
    background:
      medium: "painterly"
      color_mode: "brand-tinted-neutral"
      saturation: "muted"
      light_source: "ambient"
      falloff: "soft"
      vignette: "subtle"
      texture: "paper"
      motion: "static"
      intensity: "subtle"
      safe_zone: "masked-for-text"
      color_palette:
        - "#F7F7F4"
        - "#F2F1ED"
        - "#D6D0C7"
        - "#B7AAA2"
        - "#F54E00"
    hero:
      subject: "device"
      placement: "center"
      scale: "dominant"
      tint: "neutral"
    relation:
      type: "shadow-only"
      bleed: 0
    disclaimer: "Rendered as an abstract product-window composition with painterly support. Cursor's real screenshots and imagery remain proprietary."

  iconography:
    observed_style:
      description: "Cursor uses compact geometric symbols and a proprietary icon font inside product demos. Strokes are regular, corners are soft, and the overall feel is utilitarian rather than illustrative."
      stroke_weight: "regular"
      corner_treatment: "soft"
      fill_style: "mixed"
      form_language: "geometric"
      visual_density: "minimal"
    fallback_kit:
      name: "Tabler Icons"
      weight: "outline"
      match_score: "high"
      match_reasoning: "Tabler gets close to Cursor's light geometric strokes, compact utility posture, and developer-tool neutrality. Lucide is a close second, but Tabler's denser system feel better matches the product demos."
      cdn: "https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
      icon_class_prefix: "ti ti-"
    disclaimer: "The generated package uses Tabler as a best-match fallback. Cursor's actual icon assets are proprietary."

components:
  button_primary:
    source: "observed"
    teardown: "Homepage and product-page main download CTA"
    background: "{tokens.colors.light.text1}"
    color: "{tokens.colors.light.background}"
    font_family: "{tokens.typography.body.family}"
    font_size: "{tokens.type_scale.body.size}"
    font_weight: 400
    padding: "12.48px 21.6px 12.8px"
    height: "43px"
    radius: "{tokens.radii.pill}"
    border: "1px solid {tokens.colors.light.text1}"
    shadow: "none"
    hover:
      background: "{primitives.colors.neutral.800}"
    notes: "Primary CTAs are dark ink pills, not orange fills."

  button_secondary:
    source: "observed"
    teardown: "Homepage secondary CTA and light pricing CTAs"
    background: "{tokens.colors.light.surface3}"
    color: "{tokens.colors.light.text1}"
    font_size: "{tokens.type_scale.body.size}"
    font_weight: 400
    padding: "12.48px 21.6px 12.8px"
    height: "43px"
    radius: "{tokens.radii.pill}"
    border: "1px solid rgba(38,37,30,0.025)"
    shadow: "none"
    hover:
      background: "{tokens.colors.light.surface2}"

  button_nav_pill:
    source: "observed"
    teardown: "Header-level contact and download actions"
    background: "transparent"
    color: "{tokens.colors.light.text1}"
    font_size: "{tokens.type_scale.body_sm.size}"
    font_weight: 400
    padding: "5.6px 10.5px 5.88px"
    height: "32px"
    radius: "{tokens.radii.pill}"
    border: "1px solid rgba(38,37,30,0.20)"

  pricing_card:
    source: "observed"
    teardown: "Pricing plan cards on /pricing"
    background: "{tokens.colors.light.surface1}"
    radius: "{tokens.radii.element}"
    padding: "13.4px 15px 15px"
    height: "369px"
    border: "none"
    shadow: "none"

  segmented_toggle:
    source: "observed"
    teardown: "Monthly / Yearly pricing switcher"
    background: "{tokens.colors.light.surface1}"
    radius: "{tokens.radii.pill}"
    padding: "2px"
    width: "192px"
    height: "42px"
    active_track:
      background: "{tokens.colors.light.surface3}"
      border: "1px solid rgba(38,37,30,0.025)"
      width: "101px"
      height: "38px"
    label:
      font_size: "{tokens.type_scale.body.size}"
      padding: "9.6px 20px 9.92px"

  demo_window:
    source: "observed"
    teardown: "Homepage and product-page main product windows"
    background: "{tokens.colors.light.surface1}"
    radius: "{tokens.radii.component}"
    border: "1px solid rgba(38,37,30,0.10)"
    shadow: "{tokens.elevation.shadows.hero_window}"
    titlebar_background: "{tokens.colors.light.surface1}"
    chrome_text: "{tokens.colors.light.text2}"

  code_chip:
    source: "observed"
    teardown: "Small in-demo utility pills such as Get Cursor"
    background: "transparent"
    color: "{tokens.colors.light.text2}"
    font_size: "{tokens.type_scale.caption.size}"
    font_weight: 400
    padding: "4px 8px"
    radius: "{tokens.radii.element}"
    border: "1px solid rgba(38,37,30,0.10)"

  input_field:
    source: "derived"
    teardown: "Not directly exposed as a standalone marketing form field; derived from pricing cards, segmented control, and product-window chrome"
    background: "{tokens.colors.light.surface1}"
    color: "{tokens.colors.light.text1}"
    placeholder: "{tokens.colors.light.text3}"
    border_default: "1px solid rgba(38,37,30,0.10)"
    border_focus: "1px solid {tokens.colors.light.accent}"
    focus_ring: "0 0 0 1px {tokens.colors.light.accent_subtle}"
    radius: "{tokens.radii.control}"
    padding: "12px 14px"
    notes: "Derived to preserve Cursor's warm paper surface and sharp-but-not-brutal geometry."
