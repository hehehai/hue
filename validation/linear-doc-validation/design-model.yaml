name: "Operational Midnight Grid"
description: "A dark-first operational design system built from near-black neutrals, compact control geometry, restrained indigo signaling, and product-shell-first composition."
philosophy: "Precision before spectacle. The system reduces decoration, compresses chrome, and lets structure, contrast, and product framing communicate control. Editorial warmth appears only as an intentional side-channel, never as the default posture."
primary_mode: "dark"
domain: "product planning / issue tracking / team operations"
system_type: "ui-rich"
mono_for_code: true
mono_for_metrics: false

primitives:
  colors:
    neutral:
      0: "#FFFFFF"
      50: "#F7F8F8"
      100: "#E6E6E6"
      200: "#D0D6E0"
      300: "#8A8F98"
      400: "#62666D"
      500: "#424449"
      600: "#34353A"
      700: "#28292E"
      800: "#1E2022"
      900: "#141516"
      950: "#08090A"
    accent:
      50: "#EEF1FF"
      100: "#D9DEFF"
      200: "#B8C0FF"
      300: "#9AA5FF"
      400: "#6D78D5"
      500: "#5E6AD2"
      600: "#5142C4"
      700: "#373A56"
      800: "#2A2D48"
      900: "#18182F"
    red:
      50: "#FEF2F2"
      500: "#EB5757"
      900: "#7F1D1D"
    green:
      50: "#F0FDF4"
      500: "#27A644"
      900: "#14532D"
    amber:
      50: "#FFFBEB"
      500: "#F0BF00"
      900: "#78350F"
  spacing: [0, 2, 4, 8, 12, 16, 20, 24, 32, 48, 64, 96, 128]
  radii: [0, 4, 6, 8, 12, 999]

tokens:
  colors:
    dark:
      background: "{neutral.950}"
      surface1: "{neutral.900}"
      surface2: "{neutral.800}"
      surface3: "{neutral.700}"
      border: "{neutral.700}"
      border_visible: "{neutral.600}"
      text1: "{neutral.50}"
      text2: "{neutral.200}"
      text3: "{neutral.300}"
      text4: "{neutral.400}"
      accent: "{accent.500}"
      accent_hover: "{accent.400}"
      accent_subtle: "{accent.900}"
    light:
      background: "{neutral.0}"
      surface1: "{neutral.50}"
      surface2: "#F5F5F5"
      surface3: "{neutral.100}"
      border: "#E0E0E0"
      border_visible: "{neutral.200}"
      text1: "#2F2F31"
      text2: "#5C5D5F"
      text3: "#9E9EA0"
      text4: "#B0B5C0"
      accent: "{accent.500}"
      accent_hover: "{accent.400}"
      accent_subtle: "{accent.50}"
    status:
      success: "{green.500}"
      warning: "{amber.500}"
      error: "{red.500}"

  spacing:
    2xs: 2
    xs: 4
    sm: 8
    md: 16
    lg: 24
    xl: 32
    2xl: 48
    3xl: 64
    4xl: 96

  radii:
    element: 4
    control: 6
    component: 8
    container: 12
    pill: 999

  typography:
    display:
      family: "Inter"
      observed_character: "Dense, efficient sans hierarchy with low ornament and strong operational clarity."
      fallback: "'SF Pro Display', -apple-system, system-ui, sans-serif"
      size: "64px"
      weight: 510
      line_height: 1
      letter_spacing: "-0.022em"
      google_fonts: "Inter:wght@400;500;600;700"
    body:
      family: "Inter"
      observed_character: "Compact UI workhorse tuned for dense product communication."
      fallback: "'SF Pro Display', -apple-system, system-ui, sans-serif"
      size: "15px"
      weight: 400
      line_height: 1.6
      letter_spacing: "-0.011em"
      google_fonts: "Inter:wght@400;500;600;700"
    mono:
      family: "JetBrains Mono"
      observed_character: "Compact technical mono reserved for code-adjacent or infra-like detail."
      fallback: "'SF Mono', Menlo, monospace"
      size: "12px"
      weight: 400
      google_fonts: "JetBrains+Mono:wght@400;500"
    editorial_display:
      family: "Cormorant Garamond"
      observed_character: "A serif interrupt used only when the narrative mode becomes reflective rather than operational."
      fallback: "ui-serif, Georgia, serif"
      google_fonts: "Cormorant+Garamond:wght@400;500;600"

  type_scale:
    display: { size: "64px", line_height: 1.0, letter_spacing: "-0.022em", weight: 510, use: "Hero headline" }
    h1: { size: "40px", line_height: 1.1, letter_spacing: "-0.022em", weight: 510, use: "Primary section headings" }
    h2: { size: "20px", line_height: 1.33, letter_spacing: "-0.012em", weight: 590, use: "Feature and card titles" }
    h3: { size: "16px", line_height: 1.45, letter_spacing: "-0.01em", weight: 510, use: "Subheads and dense UI labels" }
    body: { size: "15px", line_height: 1.6, letter_spacing: "-0.011em", weight: 400, use: "Body copy and product labels" }
    body_sm: { size: "13px", line_height: 1.5, letter_spacing: "-0.01em", weight: 400, use: "Navigation and metadata" }
    caption: { size: "12px", line_height: 1.4, letter_spacing: "0em", weight: 400, use: "Footnotes and tertiary labels" }
    label: { size: "11px", line_height: 1.3, letter_spacing: "0.06em", weight: 510, use: "Eyebrows and tiny metadata" }
    editorial: { size: "128px", line_height: 0.98, letter_spacing: "0em", weight: 400, use: "Large serif interruption on editorial surfaces" }

  elevation:
    strategy: "flat-with-micro-stack"
    notes: "Depth comes from border contrast, inset hairlines, and tightly controlled micro-shadows. Atmospheric shadow is intentionally absent."
    shadows:
      cta_light: "0px 8px 2px 0px rgba(0,0,0,0), 0px 5px 2px 0px rgba(0,0,0,0.01), 0px 3px 2px 0px rgba(0,0,0,0.04), 0px 1px 1px 0px rgba(0,0,0,0.07), 0px 0px 1px 0px rgba(0,0,0,0.08)"
      cta_dark: "0px 0px 0px 1px rgba(255,255,255,0.03) inset, 0px 1px 0px 0px rgba(255,255,255,0.04) inset, 0px 0px 0px 1px rgba(0,0,0,0.6), 0px 4px 4px 0px rgba(0,0,0,0.1)"
      panel_inset: "0px 0px 0px 1px #23252A inset"
      low: "0px 2px 4px rgba(0,0,0,0.1)"

  motion:
    personality: "mechanical"
    easing: "ease-out"
    duration_fast: "100ms"
    duration_normal: "250ms"
    duration_slow: "350ms"
    notes: "Motion is terse, direct, and never springy."

  hero_stage:
    preset: null
    observed_style:
      description: "A near-blank dark field with a centered product shell as the main identity signal. The absence of decorative atmosphere is a major decision."
      where_used:
        - "landing hero"
      notes: "The product frame, not the background, should carry trust."
    background:
      medium: "absent"
      color_mode: "brand-tinted-neutral"
      saturation: "flat"
      light_source: "ambient"
      falloff: "soft"
      vignette: "off"
      texture: "clean"
      motion: "static"
      intensity: "subtle"
      safe_zone: "masked-for-text"
      color_palette:
        - "#08090A"
        - "#141516"
        - "#18182F"
        - "#5E6AD2"
    hero:
      subject: "device"
      placement: "center"
      scale: "dominant"
      tint: "neutral"
    relation:
      type: "shadow-only"
      bleed: 0
    disclaimer: "Rendered as an abstract product-window composition on a near-blank field."

  iconography:
    observed_style:
      description: "Compact geometric glyphs with a calm infrastructural feel. Icons support structure and status rather than becoming expressive objects."
      stroke_weight: "regular"
      corner_treatment: "soft"
      fill_style: "mixed"
      form_language: "geometric"
      visual_density: "minimal"
    fallback_kit:
      name: "Material Symbols Rounded"
      weight: "400 fill"
      match_score: "medium"
      match_reasoning: "Material Symbols Rounded preserves the dense system feel and compact utility posture needed for operational UI. It remains more generic than the observed set, but it stays structurally close."
      cdn: "https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0"
      icon_class_prefix: "material-symbols-rounded"
    disclaimer: "The generated package uses an open fallback icon kit instead of any proprietary source set."

components:
  button_primary:
    source: "observed"
    background: "{tokens.colors.light.surface3}"
    background_dark: "{tokens.colors.dark.text1}"
    color: "{tokens.colors.light.text1}"
    color_dark: "{tokens.colors.dark.background}"
    font_family: "{tokens.typography.body.family}"
    font_size: "{tokens.type_scale.body_sm.size}"
    font_weight: 510
    padding: "0px 12px"
    height: "32px"
    radius: "{tokens.radii.element}"
    border: "1px solid currentColor"
    shadow_light: "{tokens.elevation.shadows.cta_light}"
    notes: "Primary actions stay neutral-filled rather than accent-filled."

  button_secondary:
    source: "observed"
    background: "rgba(255,255,255,0.02)"
    color: "{tokens.colors.dark.text2}"
    font_size: "{tokens.type_scale.body_sm.size}"
    font_weight: 400
    padding: "0px 12px"
    height: "32px"
    radius: "{tokens.radii.control}"
    border: "1px solid rgb(36, 40, 44)"
    shadow: "none"

  button_link:
    source: "observed"
    background: "transparent"
    color: "{tokens.colors.dark.text1}"
    accent_dot: "{tokens.colors.dark.accent}"
    font_size: "{tokens.type_scale.body.size}"
    font_weight: 400
    border: "none"

  card:
    source: "observed"
    background: "{tokens.colors.dark.surface1}"
    radius: "{tokens.radii.container}"
    padding: "24px 24px 28px"
    border: "1px solid rgba(255,255,255,0.05)"
    shadow: "none"
    inset_stroke: "{tokens.elevation.shadows.panel_inset}"

  input:
    source: "observed"
    background: "rgba(255,255,255,0.02)"
    radius: "{tokens.radii.control}"
    padding: "12px 14px"
    border_default: "1px solid rgba(255,255,255,0.08)"
    border_focus: "1px solid #5E6AD2"
    focus_ring: "0px 0px 0px 1px #5E6AD2"
    text_color: "{tokens.colors.dark.text2}"
    placeholder_color: "{tokens.colors.dark.text3}"

  tab_pill:
    source: "observed"
    radius: "{tokens.radii.pill}"
    padding: "0px 16px"
    height: "40px"
    selected:
      background: "{tokens.colors.dark.text1}"
      color: "{tokens.colors.dark.background}"
      border: "1px solid {tokens.colors.dark.text1}"
    idle:
      background: "transparent"
      color: "{tokens.colors.dark.text3}"
      border: "1px solid rgba(255,255,255,0.05)"

  list_row:
    source: "observed"
    height: "56px"
    border_bottom: "1px solid rgba(255,255,255,0.05)"
    text_primary: "{tokens.colors.dark.text1}"
    text_secondary: "{tokens.colors.dark.text3}"
    interaction: "Rows stay visually flat; emphasis comes from alignment and contrast rather than hover fill."

  nav_item:
    source: "observed"
    radius: "{tokens.radii.control}"
    padding: "0px 6px"
    font_size: "{tokens.type_scale.body_sm.size}"
    font_weight: 510
    idle_color: "{tokens.colors.dark.text2}"
    active_background: "rgba(255,255,255,0.04)"
    muted_color: "{tokens.colors.dark.text4}"

responsive_behavior:
  breakpoints:
    small_mobile:
      width: "<479px"
      key_changes:
        - "Hero stacks vertically"
        - "Story cards become a single-column feed"
        - "Navigation collapses fully"
    mobile:
      width: "479-640px"
      key_changes:
        - "Single-column flow"
        - "Tighter headline scale"
        - "Pill filters wrap or scroll horizontally"
    large_mobile:
      width: "640-767px"
      key_changes:
        - "Single-column layout with wider content rail"
    tablet:
      width: "768-991px"
      key_changes:
        - "2-column proof grids can begin"
        - "Hero screenshot grows"
    desktop:
      width: "992px+"
      key_changes:
        - "Full multi-column layout"
        - "Centered hero product shell"

  typography_scaling:
    display: { desktop: "64px", tablet: "48px", mobile: "34px", small_mobile: "28px" }
    h1: { desktop: "40px", tablet: "32px", mobile: "26px", small_mobile: "24px" }
    h2: { desktop: "20px", tablet: "20px", mobile: "18px", small_mobile: "18px" }
    body: { desktop: "15px", tablet: "15px", mobile: "15px", small_mobile: "14px" }

  touch_targets:
    minimum: "44x44px"
    notes:
      - "Header actions stay tap-safe even when visually compact."
      - "Pill filters preserve comfortable thumb targets."
      - "Interactive list rows may act as large touch surfaces."

  collapsing_strategy:
    navigation: "Horizontal desktop navigation becomes a mobile menu or drawer."
    hero: "Headline and copy stack above the product shell."
    story_cards: "Multi-column proof cards become stacked vertical cards."
    feature_rows: "Side-by-side text and product panels become a single-column stack."
    pill_filters: "Grouped selectors wrap or become horizontally scrollable."

  image_behavior:
    screenshots: "Product screenshots keep aspect ratio inside compact rounded containers."
    product_shells: "Embedded app shells scale proportionally and remain the focus object."
    editorial_panels: "Editorial diagrams may crop slightly but should not change art direction."
    art_direction_changes: false

dos_and_donts:
  do:
    - "Use #08090A and adjacent near-black neutrals as the default canvas."
    - "Keep most control radii in the 4px to 6px range."
    - "Use indigo as a focused signal rather than a full-surface wash."
    - "Let borders and inset strokes do more work than shadows."
    - "Reserve serif moments for explicit editorial context."
    - "Let the product shell remain the main object of trust."
  dont:
    - "Don't flood whole sections with indigo or purple."
    - "Don't soften the core UI with large consumer-style radii."
    - "Don't add glow, glassmorphism, or cinematic gradients to basic surfaces."
    - "Don't spread pill geometry across every control in the system."
    - "Don't let serif typography leak into default UI hierarchy."
    - "Don't turn the hero into an atmospheric art piece."

anti_patterns:
  - "No gradient-heavy hero field behind the primary product shell."
  - "No soft consumer-style 12px+ radius on default controls."
  - "No accent-colored primary buttons across the whole interface."
  - "No plush shadows on cards and panels."
  - "No serif in navigation, forms, or default system labels."
  - "No decorative background treatment that outranks the product shell."

iteration_heuristics:
  safe_adjustments:
    - "Tune neutral contrast while preserving the near-black hierarchy."
    - "Adjust indigo intensity without making it environmental."
    - "Refine border visibility and inset depth for different display contexts."
  high_risk_changes:
    - "Switching the primary expression away from dark mode."
    - "Inflating radii across the core control system."
    - "Turning the editorial serif interrupt into a global display language."
